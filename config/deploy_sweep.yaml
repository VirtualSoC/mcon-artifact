# Full app-deployment sweep (fig/container_install_time.pdf).
#
# Measures end-to-end time to deploy the top-50 corpus to N tenants as N grows.
# MCon installs each app ONCE on user 0 (physical) then logically maps it into
# every tenant via `pm install-existing` (near-O(1) in N); the metric is the sum
# of both phases. Each density resets userdata + re-warms so apps start absent.
#
# Mirrors default.yaml's deploy settings but with a fail-fast launcher timeout
# (like sweep.yaml) so densities beyond the GPU's headroom bail out in ~2 min
# instead of hanging ~10 min per stuck tenant. autoscale stops the sweep after
# the first density that fails and bisects the true ceiling.
#
# NOTE ON HARDWARE: the paper used an RTX A4000 (16 GiB) and deployed to 64
# tenants. On a 6 GiB GPU (GTX 1660 Ti) expect the wall around ~48 tenants; the
# qualitative trend (deploy time grows far slower than O(N)) still holds.

paths:
  base_dir: ${BASE_DIR}
  vsoc_img_path: ${GUEST_IMG_PATH}
  scalebench_dir: ${BASE_DIR}/scalebench

adb:
  start_port: 5555
  monitor_port: 55555
  bridge_port: 5555

mcon:
  launcher_timeout_s: 120        # fail fast: a stuck tenant bails in 2 min, not 10

sweep:
  densities: [1, 2, 4, 8, 16, 32, 64]
  trials: 5                      # paper repeats each point 5x
  autoscale: true                # stop after the first density that fails, then bisect

experiments:
  deploy:
    apps_dir: ${BASE_DIR}/scalebench/apps  # top-50 APK/XAPK corpus on disk
    max_apps: null                            # null = full corpus
    provision_interval_s: 0.5                  # pacing while bringing tenants up (not measured)
    boot_timeout_s: 180
    # Per-tenant logical-mapping concurrency (pm install-existing). The reference
    # evaluate.py maps SERIALLY (=1); unbounded parallelism convoys on the
    # PackageManagerService install lock and blows up map_s super-linearly
    # (measured map_s ~63s@N=8 -> ~1500s@N=16 with one thread per tenant),
    # destroying the near-O(1) deployment trend. Keep at 1 to match the paper.
    map_concurrency: 1

output:
  runs_dir: data/runs
  reference_dir: data/reference
  figures_dir: data/figures
